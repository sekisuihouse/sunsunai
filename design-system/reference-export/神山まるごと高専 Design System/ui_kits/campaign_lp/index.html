<!-- @dsCard group="Campaign LP" viewport="1080x900" name="キャンペーンLP" subtitle="学校説明会（tour）/ 未来の学校FES（event）切替" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>神山まるごと高専 — Campaign LP Kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body style="margin:0;background:#fff;">
<div id="root"></div>
<script type="text/babel">
const { CampaignLandingPage } = window.DesignSystem_8a2dbb;

function App() {
  const [scope, setScope] = React.useState(() => localStorage.getItem('km-lp-scope') || 'campaign-tour');
  const set = (s) => { setScope(s); localStorage.setItem('km-lp-scope', s); };
  return (
    <div>
      <div style={{ position: 'fixed', bottom: 12, right: 12, zIndex: 99, display: 'flex', gap: 6, background: '#000', borderRadius: 999, padding: 6 }}>
        <button onClick={() => set('campaign-tour')} style={{ font: '700 12px sans-serif', padding: '6px 14px', borderRadius: 999, border: 'none', cursor: 'pointer', background: scope === 'campaign-tour' ? '#fff' : 'transparent', color: scope === 'campaign-tour' ? '#000' : '#fff' }}>学校説明会</button>
        <button onClick={() => set('campaign-event')} style={{ font: '700 12px sans-serif', padding: '6px 14px', borderRadius: 999, border: 'none', cursor: 'pointer', background: scope === 'campaign-event' ? '#fff' : 'transparent', color: scope === 'campaign-event' ? '#000' : '#fff' }}>未来の学校FES</button>
      </div>
      <div data-screen-label={scope}>
        {scope === 'campaign-tour' ? (
          <CampaignLandingPage
            scope="campaign-tour"
            title="学校説明会"
            subtitle="神山まるごと高専をまるごと体験しよう"
            whiteLogoSrc="../../assets/logos/kamiyama_logo-white.svg"
            heroImage="../../assets/img/photo_experience.jpg"
            sections={[
              { heading: '開催概要', body: '現地開催とオンラインの両方で開催します。中学生と保護者の方が対象です。' },
              { heading: '当日の内容', body: '学校紹介、カリキュラム説明、在校生との交流、キャンパスツアーを予定しています。' },
            ]}
            ctaLabel="説明会に申し込む"
          />
        ) : (
          <CampaignLandingPage
            scope="campaign-event"
            title="未来の学校FES"
            subtitle="テクノロジー×デザイン×起業家精神"
            whiteLogoSrc="../../assets/logos/kamiyama_logo-white.svg"
            heroImage="../../assets/img/photo_fellow.jpg"
            sections={[
              { heading: 'イベント内容', body: '起業家によるトークセッション、ワークショップ、学生プロジェクト展示を開催します。' },
              { heading: '参加方法', body: '参加無料・事前登録制です。下のボタンからご登録ください。' },
            ]}
            ctaLabel="参加登録する"
          />
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
