<!-- @dsCard group="Colors" viewport="700x150" name="Core Palette" subtitle="白キャンバス・黒テキスト・黒枠のモノクロ基調" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;display:flex;gap:12px;padding:16px;align-items:stretch;">
<div style="flex:1;border:1px solid var(--km-color-border-subtle);background:var(--km-color-white);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:700 12px var(--km-font-sans-ja);">white #ffffff<br><span style="font-weight:500;color:#888;">--km-color-background</span></div>
<div style="flex:1;background:var(--km-color-black);color:#fff;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:700 12px var(--km-font-sans-ja);">black #000000<br><span style="font-weight:500;color:#aaa;">--km-color-text / border-strong</span></div>
<div style="flex:1;border:4px solid var(--km-color-black);background:#fff;display:flex;align-items:center;justify-content:center;font:700 13px var(--km-font-sans-ja);">4px 黒枠</div>
<div style="flex:1;background:var(--km-color-surface-muted);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font:700 12px var(--km-font-sans-ja);">muted #f7f7f7<br><span style="font-weight:500;color:#888;">--km-color-surface-muted</span></div>
</body>
</html>
